<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Form</title>
</head>

<body>

  <div class="container">
    <h2>Login</h2>

    <form>
      <label>Email:</label>
      <input type="text" placeholder="Enter email">

      <label>Password:</label>
      <input type="password" placeholder="Enter password">

      <button type="submit">Login</button>
    </form>
  </div>

</body>
</html>
