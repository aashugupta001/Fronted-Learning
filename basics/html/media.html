<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media Practice</title>
</head>

<body>

    <h1>Media in HTML</h1>

    <!-- Image Section -->
    <h2>Image</h2>
    <img src="assets/images/sample.jpg" alt="Sample Image" width="300">

    <!-- Audio Section -->
    <h2>Audio</h2>
    <audio controls>
        <source src="assets/audio/sample.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <!-- Video Section -->
    <h2>Video</h2>
    <video width="400" controls>
        <source src="assets/videos/sample.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <!-- External Link -->
    <h2>External Link</h2>
    <a href="https://google.com" target="_blank">Visit Google</a>

</body>
</html>
