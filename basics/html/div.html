<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div FInal Practice set </title>
    <style>
        .square{
            background-color: red;
            display: inline-block;
            width:300px;
            height:300px;
        }.circle{
            background-color: blue;
            display: inline-block;
            width:300px;
            height:300px;
            border-radius: 50%;
        }
        .box{
            width:400px;
            height:200px;
            background-color: white;
            box-sizing: border-box;
            display: block;
            border-color: black;
            /* border-right-color: aqua; */
            border-width: 10px;
            border-style: solid;
            /* box-shadow: 34px 34px 0 0 pink; */

        }
        p{
            text-align: left;
            margin-left: 15px;
        }
        .yes{
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 15px;
            cursor: pointer;
        }
        .no{
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }
        .box2{
            background-color: black;
            color: white;
            width:400px;
            height:200px;
            margin-top: 50px;
            border-style: solid;
            border-width: 10px;
            border-color: grey;

        }
        h2{
            margin-top: 15px;
            margin-left: 15px;

        }
        .second{
            color:rgb(189, 181, 181);
        }

    </style>
</head>
<body>
    <div class="square"></div>
    <div class="circle"></div>
    <div class="box">
        <p>Satisfied with our service</p>
        <button class="yes">Yes</button>
        <button class="no">No</button>

    </div>
    <div class="box2">
        <h2>Install YouTube Music</h2>
        <p class="second">Add YouTube Music to your device for quick and easy access.</p>
    </div>
    <h1>h1</h1>
    <h2>h2</h2>
    <h3>h3</h3>
    <h4>h4 </h4>
    <h5>h5</h5>
    <h6>h6</h6>
    <img src="image.png"alt="google">
    <a href="/google.org>this  is for google website</a>
    
</body>
</html>
