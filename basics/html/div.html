<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Final Practice</title>

    <style>
        .square, .circle {
            display: inline-block;
            width: 300px;
            height: 300px;
            margin: 10px;
        }

        .square {
            background-color: red;
        }

        .circle {
            background-color: blue;
            border-radius: 50%;
        }

        .box {
            width: 400px;
            height: 200px;
            background-color: white;
            border: 10px solid black;
            margin-top: 20px;
        }

        p {
            margin-left: 15px;
        }

        .yes {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 15px;
            cursor: pointer;
        }

        .no {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }

        .box2 {
            background-color: black;
            color: white;
            width: 400px;
            height: 200px;
            margin-top: 50px;
            border: 10px solid grey;
        }

        h2 {
            margin: 15px;
        }

        .second {
            color: rgb(189, 181, 181);
            margin-left: 15px;
        }
    </style>
</head>

<body>

    <div class="square"></div>
    <div class="circle"></div>

    <div class="box">
        <p>Satisfied with our service</p>
        <button class="yes">Yes</button>
        <button class="no">No</button>
    </div>

    <div class="box2">
        <h2>Install YouTube Music</h2>
        <p class="second">Add YouTube Music to your device for quick and easy access.</p>
    </div>

    <h1>h1</h1>
    <h2>h2</h2>
    <h3>h3</h3>
    <h4>h4</h4>
    <h5>h5</h5>
    <h6>h6</h6>

    <img src="image.png" alt="sample image">

    <br><br>

    <a href="https://google.com">Go to Google</a>

</body>
</html>
