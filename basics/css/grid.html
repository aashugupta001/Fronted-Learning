<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid element </title>
    <style>

    </style>
</head>
<body>
    <div style="display: grid; grid-template-columns: 100px 100px;">

        <div class="div1" style="background-color: aquamarine;"> div 1</div>
        <div class="div2" style="background-color: blue;">div 2 <p>text</p></div>
    </div>
    <div style="
    margin-top:10px;
    display: grid; grid-template-columns: 100px 100px 200px;">

        <div class="div1" style="background-color: aquamarine;"> div 1</div>
        <div class="div2" style="background-color: blue;">div 2 <p>text</p></div>
        <div class="div1" style="background-color: aquamarine;"> div 3</div>
         <div class="div2" style="background-color: blue;">div 2 <p>text</p></div>
    </div>
     <div style="
    margin-top:10px;
    display: grid; grid-template-columns: 100px 1fr">

        <div class="div1" style="background-color: aquamarine;"> div 1</div>
        <div class="div2" style="background-color: blue;">1fr</div>
        
    </div>
    <div style="
    margin-top:10px;
    display: grid; grid-template-columns: 100px 1fr 1fr;">

        <div class="div1" style="background-color: aquamarine;"> div 1</div>
        <div class="div2" style="background-color: pink;">1fr</div>
        <div class="div2" style="background-color: blue;">1fr</div>
        
    </div>
     <div style="
    margin-top:10px;
    display: grid; grid-template-columns: 1fr 1fr 1fr;">

        <div class="div1" style="background-color: aquamarine;"> div 1</div>
        <div class="div2" style="background-color: pink;">1fr</div>
        <div class="div2" style="background-color: blue;">2fr</div>
        
    </div>
    <div style="
    margin-top:10px;
    display: grid; grid-template-columns: 1fr 1fr  1fr; padding-bottom: 100px;">

        <div class="div1" style="background-color: aquamarine; height: 200px;"> div 1</div>
        <div class="div2" style="background-color: pink;height: 200px;">1fr</div>
        <div class="div2" style="background-color: blue;height: 200px;">2fr</div>
        
    </div>
    <div style="
    margin-top:10px;
    display: grid; grid-template-columns: 1fr 1fr  1fr;
    column-gap: 20px; row-gap: 20px;">

        <div class="div1" style="background-color: aquamarine;height: 200px;"> div 1</div>
        <div class="div2" style="background-color: pink;height: 200px;">1fr</div>
        <div class="div2" style="background-color: blue;">2fr</div>
         <div class="div2" style="background-color: pink;height: 200px;">1fr</div>
        <div class="div2" style="background-color: blue;">2fr</div>
         <div class="div1" style="background-color: aquamarine;height: 200px;"> div 1</div>
        
    </div>
    
</body>
</html>
