<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Practice</title>
    <style>
        .header{
    height: 80px;
    border:solid 2px rgb(216, 215, 215);
    border-radius: 4px;
    border-width: 2px;
    box-shadow: 2px 1px 5px 2px rgb(193, 191, 191);
    top:0px;
    left: 0px;
    right: 0px;
    bottom: 10px;
    display: flex;
    flex-direction: row;
    flex:600px 700px 600px;
    justify-content: space-between;
    



}
.left{
    display: flex;
    flex-direction: row;
    justify-content: left;
    text-align: center;
    align-items: center;
    margin-left: 10px;
    
}
.logo-image{
    height: 30px;
    width: 97px;
    margin-right: 10px;


}
h2{
    font-family: 'Times New Roman', Times, serif;
    font-size: 20px;
    width: 150px;

}
.center{
    display: flex;
    flex-direction: row;

    justify-content: center;
    align-items: center;
    margin-left: 150px;
}
.search{
    
    padding:0px 30px 13px 240px;
    margin-right: 2px;
    cursor:progress;

}
.search-bar{
    height: 30px;

}
.right{
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    /* margin-left: 80px; */
    margin-right: 10px;

}
.subscription ,.notification ,.my-channel{
    height: 30px;
    margin-right: 20px;
}

.overview{
    height: 100px;
    border:solid 2px rgb(216, 215, 215);
    border-radius: 4px;
    border-width: 2px;
    box-shadow: 2px 1px 5px 2px rgb(193, 191, 191);
    top:0px;
    left: 0px;
    right: 0px;
    bottom: 10px;
    display: flex;
    flex-direction: row;
    flex:600px 700px 600px;
    justify-content: space-between;
    margin-top: 20px;
    align-items: center;
    text-align: center;
    
}
.explore-image,.library-image,.home-image,.upload-image{
    height: 30px;
    

}
.explore{
    margin-left: 15px;
}
.explore:hover{
    background-color:rgb(230, 229, 229);
    color:black
}
.explore:active{
    border-color:black;
    padding:2px 2px 2px 2px;
    background-color: pink;

}
.library:hover{
    background-color:rgb(230, 229, 229);
    color:black
}
.library:active{
    border-color:black;
    padding:2px 4px 2px 4px;
    background-color: lightsalmon;

}
.home:hover{
    background-color:rgb(230, 229, 229);
    color:black;
}
.home:active{
    padding:1px 2px 1px 2px;
    background-color:skyblue;

}
.upload{
    margin-right: 15px;
}
.upload:hover{
    background-color:rgb(230, 229, 229);
    color:black
}
.upload:active{
    border-color:black;
    padding:2px 2px 2px 2px;
    background-color: pink;

}
.explore-text,.library-text,.home-text,.upload-text{
    margin-top: 0px;

}

    </style>
</head>
