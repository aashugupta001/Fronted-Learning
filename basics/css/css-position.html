<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        .header{
            background-color: black;
             color:white;
            position: fixed;
            top:0;
            left:0;
            right:0;
            height: 60px;
        }
        .side-bar{
            background-color: gray;
            color: white;
            width:100px;
            position: fixed;
            left: 0px;
            bottom: 0px;
            top:60px;
            width: 72px;
            

        }
        .div1{
            background-color: lightblue;
            height: 200px;
            width: 200px;
            top:50px;
            position:static;
            

        }
        .div2{
            background-color: lightpink;
            height: 200px;
            width: 200px;
            position: static;

        }
        
    </style>
</head>
<body style="height: 3000px;
     padding-top: 78px;
     padding-left:80px ;

">
    <div class="header">Header</div>
    <div class="side-bar">
        side bar

    </div>
    <div class="div1">Div1</div>
    <div class="div2">Div2</div>
    
</body>
</html>
