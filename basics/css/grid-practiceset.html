<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Practice time</title>
    <style>
        .first-grid1 {
            display: grid;
            grid-template-columns: 2fr 300px;
            /* row-gap: 20px; */

        }

        .first {
            background-color: pink;

        }

        .second {
            background-color: rgb(220, 77, 155);
        }

        .first-grid2 {
            display: grid;
            grid-template-columns: 200px 200px 200px;
            border: solid;
            border-color: aqua pink;
            column-gap: 10px;


        }

        .div-grid {
            background-color: white;
            display: grid;
            grid-template-columns: 200px 200px 200px 200px;
            margin-top: 50px;
            margin-bottom: 30px;

            /* background-color: pink; */
            column-gap: 20px;

        }

        div {
            background-color: white;

        }

        .microsoft {
            /* display: grid;
            /* grid-template-columns: 200px 200px 200px ; */
            row-gap: 20px; 
            margin-left: 10px;
            background-color: rgb(245, 241, 241);
            display: inline-block;
            width: 200px;
            height: 250px;

            box-shadow: 2px 2px 3px 2px black;
            /* display: grid; */



        }

        .microsoft-image {
            width: 150px;
            height: 100px;
            display: block;
            margin-top: 30px;
        }

        .logo {
            width: 50px;
            height: auto;
            border-radius: 50%;
            display: block;
            margin-left: 5px;
        }

        p {
            text-align: center;
        }

        .click {
            background-color: skyblue;
            color: white;
            border-radius: 20px;
            padding: 5px 7px 5px 7px;
            margin-bottom: 10px;
            margin-left: 5px;

        }
    </style>
</head>

<body>
    <div class="first-grid1">
        <div class="first">200px</div>
        <div class="second">75px</div>
    </div>
    <div class="first-grid2">

        <div style="background-color: red;">column 2</div>
        <div style="background-color: burlywood;">column 1 </div>

        <div style="background-color: orange;"> column 3</div>
    </div>
    <div>
        <div class="div-grid">
            <div style="background-color:pink;">column 1</div>
            <div style="background-color:pink;">column 2</div>
            <div style="background-color:pink;">column 3</div>
            <div style="background-color:pink;">column 4</div>
        </div>

    </div>
    <div>
        <div class="div-grid">
            <div style="background-color:pink;">column 1</div>
            <div style="background-color:pink;">column 2</div>
            <div style="background-color:pink;">column 3</div>
            <div style="background-color:pink;">column 4</div>
        </div>

    </div>
    <div>
        <div class="microsoft">
            <img src="google.webp" alt="" class="microsoft-image">
            <p>Miscrosoft</p>
            <img src="microsoft.webp" alt="" class="logo">
            <button class="click">Add Friend</button>
        </div>
        <div class="microsoft">
            <img src="wipro.png" alt="" class="microsoft-image">
            <p>Miscrosoft</p>
            <img src="wipro.png
            " alt="" class="logo">
            <button class="click">Add Friend</button>
        </div>
         <div class="microsoft">
            <img src="amazon.webp" alt="" class="microsoft-image">
            <p>Miscrosoft</p>
            <img src="tcs.png" alt="" class="logo">
            <button class="click">Add Friend</button>
        </div>
         <div class="microsoft">
            <img src="tata.webp" alt="" class="microsoft-image">
            <p>Miscrosoft</p>
            <img src="microsoft.webp" alt="" class="logo">
            <button class="click">Add Friend</button>
        </div>
    </div>

</body>

</html>
