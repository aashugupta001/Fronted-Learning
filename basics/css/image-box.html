<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image and box  section</title>
    <style>
        body{
            background-color: white;
            color:black;
            display: block;
            margin-top:50px;
        }
        .box{
            width:400px;
            height:200px;
            background-color: white;
            box-sizing: border-box;
            display: block;
            border-color: black;
            /* border-right-color: aqua; */
            border-width: 10px;
            border-style: solid;
            justify-content: center;
        
            /* box-shadow: 34px 34px 0 0 pink; */
        }

        .image{
            display: flex;
            align-items: left;
            justify-content: left;
            gap:10px;
            width:100%
    
        }

        .profile-image{
            width:50px;
            height:40px;
            object-fit: cover;
            border-radius: 50%;
            margin-top:10px;
            
        }
        .tweet-input{
            width: 150px;;
            height:30px;
            border-radius: 0px;
            padding-left: 10px;
            display: inline-block;
            margin-top:15px;
        }
       
        .tweet{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 233px;
            cursor: pointer;
            border-radius: 20%;
            display: flex;
            margin-top:-34px;
        }
        .next{
            margin-top:20px;
            color:black;
            width:300px;
            height:650px;
            display: inline-block;
            background-color: pink;

        }
        .wipro-image{
            margin-top: 30px ;
            margin-left:5px;
            width:300px;
            height:400px;
        }
        h3 , p{
            text-align: center;
        }
        .add
        {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left:93px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
    <div class="image">
        <img src="world.webp" alt="World" class="profile-image">
        <input type="text" class="tweet-input" placeholder="what's happening ?">
        </div>
        <button class="tweet">Tweet</button>
    </div>
    <div class="next">
        <div class="image1">
            <img src="wipro.png" alt="wipro" class="wipro-image ">
            <h3>wipro</h3>
            <p>2 mutual friends</p>
            <button class="add">Add Friend</button>
        </div>
    </div>
     <div class="next">
        <div class="image1">
            <img src="google.webp" alt="google" class="wipro-image ">
            <h3>google</h3>
            <p>2 mutual friends</p>
            <button class="add">Add Friend</button>
        </div>
    </div>
     <div class="next">
        <div class="image1">
            <img src="tcs.png" alt="tata" class="wipro-image ">
            <h3>tata</h3>
            <p>2 mutual friends</p>
            <button class="add">Add Friend</button>
        </div>
    </div>
    

    
</body>
</html>
